<!DOCTYPE html>
<html>
<head>
  <title>Sistema CAEMA</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f9;
    }

    /* LOGIN */
    .login-container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(120deg, #2c3e50, #3498db);
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
    }

    .login-box img {
      width: 120px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #3498db;
      color: white;
      border: none;
      cursor: pointer;
    }

    /* SISTEMA */
    .container {
      display: flex;
    }

    .sidebar {
      width: 220px;
      background: #2c3e50;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      background: #34495e;
      border: none;
      color: white;
      cursor: pointer;
    }

    .content {
      flex: 1;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
    }

    table {
      width: 100%;
      background: white;
      border-collapse: collapse;
    }

    th {
      background: #2c3e50;
      color: white;
      padding: 10px;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login-container">
  <div class="login-box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Logo_CAEMA.png">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="login()">Entrar</button>
    <p id="erro" style="color:red;"></p>
  </div>
</div>

<!-- SISTEMA -->
<div id="sistema" style="display:none;">
  <div class="container">

    <div class="sidebar">
      <h2>📊 Sistema</h2>
      <button onclick="mostrar('dashboard')">Dashboard</button>
      <button onclick="mostrar('processos')">Processos</button>
      <button onclick="logout()">Sair</button>
    </div>

    <div class="content">

      <!-- DASHBOARD -->
      <div id="dashboard">
        <h1>Dashboard</h1>

        <iframe width="100%" height="600"
          src="https://datastudio.google.com/embed/reporting/0df2efad-e234-419c-bfbc-cf4a86ca3a53/page/TcRvF"
          frameborder="0" style="border:0" allowfullscreen>
        </iframe>
      </div>

      <!-- PROCESSOS -->
      <div id="processos" style="display:none;">
        <h1>Processos</h1>

        <div class="card">
          <h3>Total: <span id="total">0</span></h3>
          <h3>Valor Total: R$ <span id="valor">0</span></h3>
        </div>

        <input type="text" id="busca" placeholder="Buscar..." onkeyup="filtrar()">

        <table>
          <thead>
            <tr>
              <th>Processo</th>
              <th>Local</th>
              <th>Objeto</th>
              <th>Valor</th>
              <th>Diretoria</th>
              <th>Ano</th>
            </tr>
          </thead>
          <tbody id="lista"></tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://ewibndqllbxfduyzvkpl.supabase.co",
  "sb_publishable_RlS6dWkf2f8-dFvifnrLxQ_gj-nvmwM"
);

let dados = [];

// LOGIN
async function login() {
  const email = email.value;
  const senha = document.getElementById("senha").value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password: senha
  });

  if (error) {
    document.getElementById("erro").innerText = "Erro no login";
    return;
  }

  iniciarSistema();
}

// INICIAR
async function iniciarSistema() {
  document.getElementById("login").style.display = "none";
  document.getElementById("sistema").style.display = "block";

  carregarDados();
}

// LOGOUT
async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

// CARREGAR DADOS
async function carregarDados() {
  const { data, error } = await supabase
    .from("processos")
    .select("*");

  if (error) {
    alert("Erro ao carregar dados");
    return;
  }

  dados = data;
  renderizar(data);
}

// RENDER
function renderizar(lista) {
  document.getElementById("total").innerText = lista.length;

  let soma = 0;

  const tabela = document.getElementById("lista");
  tabela.innerHTML = "";

  lista.forEach(p => {
    const valor = parseFloat((p.VALOR_DA_CAUSA || "0").replace(/[^\d,]/g, "").replace(",", ".")) || 0;
    soma += valor;

    tabela.innerHTML += `
      <tr>
        <td>${p.PROCESSO || ""}</td>
        <td>${p.LOCAL || ""}</td>
        <td>${p.OBJETO_DA_ACAO || ""}</td>
        <td>${p.VALOR_DA_CAUSA || ""}</td>
        <td>${p.DIRETORIA || ""}</td>
        <td>${p.ANO || ""}</td>
      </tr>
    `;
  });

  document.getElementById("valor").innerText = soma.toFixed(2);
}

// FILTRO
function filtrar() {
  const termo = document.getElementById("busca").value.toLowerCase();

  const filtrado = dados.filter(p =>
    JSON.stringify(p).toLowerCase().includes(termo)
  );

  renderizar(filtrado);
}

// TROCAR TELA
function mostrar(tela) {
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("processos").style.display = "none";

  document.getElementById(tela).style.display = "block";
}
</script>

</body>
</html>
