<!DOCTYPE html>
<html>
<head>
  <title>Sistema de Processos</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f9;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: #2c3e50;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border: none;
      background: #34495e;
      color: white;
      cursor: pointer;
    }

    .sidebar button:hover {
      background: #1abc9c;
    }

    /* CONTEÚDO */
    .content {
      flex: 1;
      padding: 20px;
    }

    /* CARDS */
    .cards {
      display: flex;
      gap: 20px;
      margin: 20px 0;
    }

    .card {
      flex: 1;
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    /* TABELA */
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th {
      background: #2c3e50;
      color: white;
      padding: 10px;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid #ddd;
    }

    tr:hover {
      background: #f1f1f1;
    }

    input, select {
      padding: 8px;
      margin: 5px;
    }

    #login {
      margin: auto;
      text-align: center;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>📊 Sistema</h2>
  <button onclick="mostrarTela('dashboard')">Dashboard</button>
  <button onclick="mostrarTela('processos')">Processos</button>
  <button onclick="logout()">Sair</button>
</div>

<!-- CONTEÚDO -->
<div class="content">

<!-- LOGIN -->
<div id="login">
  <h2>🔐 Login</h2>
  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="password" id="senha" placeholder="Senha"><br><br>
  <button onclick="fazerLogin()">Entrar</button>
  <p id="erro" style="color:red;"></p>
</div>

<!-- SISTEMA -->
<div id="sistema" style="display:none;">

  <!-- 🔥 DASHBOARD LOOKER -->
  <div id="telaDashboard">
    <h1>📊 Dashboard</h1>

    <iframe 
      width="100%" 
      height="600" 
      src="https://datastudio.google.com/embed/reporting/eac2f3e4-77b5-4551-86b7-1a934ad0d3ea/page/3RPvF"
      frameborder="0"
      style="border:0"
      allowfullscreen>
    </iframe>
  </div>

  <!-- 🔥 PROCESSOS -->
  <div id="telaProcessos" style="display:none;">

    <h1>📋 Processos</h1>

    <!-- CARDS -->
    <div class="cards">
      <div class="card">
        <h3>Total</h3>
        <h2 id="total">0</h2>
      </div>
      <div class="card">
        <h3>Exclusão</h3>
        <h2 id="exclusao">0</h2>
      </div>
      <div class="card">
        <h3>Suspensão</h3>
        <h2 id="suspensao">0</h2>
      </div>
    </div>

    <!-- GRÁFICO -->
    <canvas id="grafico" height="100"></canvas>

    <!-- FILTROS -->
    <div>
      <input type="text" id="busca" placeholder="Buscar..." onkeyup="aplicarFiltros()">

      <select id="filtroLiminar" onchange="aplicarFiltros()">
        <option value="">Todas</option>
        <option value="exclus">Exclusão</option>
        <option value="suspens">Suspensão</option>
      </select>
    </div>

    <!-- TABELA -->
    <table>
      <thead>
        <tr>
          <th>Processo</th>
          <th>Liminar</th>
          <th>SEI</th>
          <th>Local</th>
          <th>Setor</th>
          <th>Mês</th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>

  </div>

</div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://ewibndqllbxfduyzvkpl.supabase.co",
  "sb_publishable_RlS6dWkf2f8-dFvifnrLxQ_gj-nvmwM"
);

let dadosGlobais = [];
let chart;

// 🔥 TROCA DE TELAS
function mostrarTela(tela) {
  document.getElementById("telaDashboard").style.display = "none";
  document.getElementById("telaProcessos").style.display = "none";

  if (tela === "dashboard") {
    document.getElementById("telaDashboard").style.display = "block";
  }

  if (tela === "processos") {
    document.getElementById("telaProcessos").style.display = "block";
  }
}

// LOGIN
async function fazerLogin() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email, password: senha
  });

  if (error) {
    document.getElementById("erro").innerText = "Login inválido";
    return;
  }

  verificarUsuario();
}

// VERIFICAR LOGIN
async function verificarUsuario() {
  const { data } = await supabaseClient.auth.getSession();

  if (data.session) {
    document.getElementById("login").style.display = "none";
    document.getElementById("sistema").style.display = "block";
    mostrarTela('dashboard'); // começa no dashboard
    carregarProcessos();
  }
}

// LOGOUT
async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

// CARREGAR DADOS
async function carregarProcessos() {
  const { data } = await supabaseClient
    .from('processos')
    .select('*');

  dadosGlobais = data;
  atualizarTudo(data);
}

// ATUALIZA TUDO
function atualizarTudo(dados) {
  atualizarCards(dados);
  renderizarTabela(dados);
  atualizarGrafico(dados);
}

// CARDS
function atualizarCards(dados) {
  document.getElementById("total").innerText = dados.length;

  const exclusao = dados.filter(p => (p.LIMINAR || "").toLowerCase().includes("exclus")).length;
  const suspensao = dados.filter(p => (p.LIMINAR || "").toLowerCase().includes("suspens")).length;

  document.getElementById("exclusao").innerText = exclusao;
  document.getElementById("suspensao").innerText = suspensao;
}

// TABELA
function renderizarTabela(dados) {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  dados.forEach(p => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${p.PROCESSO || ""}</td>
      <td>${p.LIMINAR || ""}</td>
      <td>${p.SEI || ""}</td>
      <td>${p.LOCAL || ""}</td>
      <td>${p.SETOR || ""}</td>
      <td>${p.MES || ""}</td>
    `;

    lista.appendChild(tr);
  });
}

// FILTROS
function aplicarFiltros() {
  const busca = document.getElementById("busca").value.toLowerCase();
  const tipo = document.getElementById("filtroLiminar").value;

  const filtrados = dadosGlobais.filter(p => {
    const texto = JSON.stringify(p).toLowerCase();
    const liminar = (p.LIMINAR || "").toLowerCase();

    let matchTipo = true;

    if (tipo === "exclus") matchTipo = liminar.includes("exclus");
    if (tipo === "suspens") matchTipo = liminar.includes("suspens");

    return texto.includes(busca) && matchTipo;
  });

  atualizarTudo(filtrados);
}

// GRÁFICO
function atualizarGrafico(dados) {
  const exclusao = dados.filter(p => (p.LIMINAR || "").toLowerCase().includes("exclus")).length;
  const suspensao = dados.filter(p => (p.LIMINAR || "").toLowerCase().includes("suspens")).length;

  if (chart) chart.destroy();

  const ctx = document.getElementById('grafico');

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Exclusão', 'Suspensão'],
      datasets: [{
        label: 'Quantidade',
        data: [exclusao, suspensao]
      }]
    }
  });
}

verificarUsuario();
</script>

</body>
</html>
