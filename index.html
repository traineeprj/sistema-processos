<!DOCTYPE html>
<html>
<head>
  <title>Sistema de Processos</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
    }

    h1 {
      color: #333;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 15px;
    }

    th {
      background: #2c3e50;
      color: white;
    }

    td, th {
      padding: 8px;
      border: 1px solid #ccc;
      text-align: left;
    }

    tr:nth-child(even) {
      background: #f2f2f2;
    }

    input, select {
      padding: 8px;
      margin: 5px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>📊 Sistema de Processos</h1>

  <!-- LOGIN -->
  <div id="login">
    <h2>🔐 Login</h2>
    <input type="email" id="email" placeholder="Email"><br>
    <input type="password" id="senha" placeholder="Senha"><br>
    <button onclick="login()">Entrar</button>
    <p id="erro" style="color:red;"></p>
  </div>

  <!-- SISTEMA -->
  <div id="sistema" style="display:none;">

    <button onclick="logout()">Sair</button>

    <h2>📋 Processos</h2>

    <!-- FILTROS -->
    <input type="text" id="busca" placeholder="Buscar..." onkeyup="filtrar()">

    <select id="filtroMes" onchange="filtrar()">
      <option value="">Todos os meses</option>
      <option value="JANEIRO">Janeiro</option>
      <option value="FEVEREIRO">Fevereiro</option>
      <option value="MARÇO">Março</option>
    </select>

    <!-- TABELA -->
    <table>
      <thead>
        <tr>
          <th>Processo</th>
          <th>Liminar</th>
          <th>SEI</th>
          <th>Local</th>
          <th>Setor</th>
          <th>Mês</th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>

  </div>

  <script>
    const supabaseClient = supabase.createClient(
      "https://ewibndqllbxfduyzvkpl.supabase.co",
      "sb_publishable_RlS6dWkf2f8-dFvifnrLxQ_gj-nvmwM"
    );

    let dadosGlobais = [];

    // Verifica login
    async function verificarUsuario() {
      const { data } = await supabaseClient.auth.getSession();

      if (data.session) {
        document.getElementById("login").style.display = "none";
        document.getElementById("sistema").style.display = "block";
        carregarProcessos();
      }
    }

    // Login
    async function login() {
      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;

      const { error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: senha
      });

      if (error) {
        document.getElementById("erro").innerText = "Login inválido";
        return;
      }

      verificarUsuario();
    }

    // Logout
    async function logout() {
      await supabaseClient.auth.signOut();
      location.reload();
    }

    // Carrega dados
    async function carregarProcessos() {
      const { data, error } = await supabaseClient
        .from('processos')
        .select('*');

      if (error) {
        alert("Erro ao carregar dados");
        return;
      }

      dadosGlobais = data;
      renderTabela(data);
    }

    // Renderiza tabela
    function renderTabela(dados) {
      const lista = document.getElementById("lista");
      lista.innerHTML = "";

      dados.forEach(p => {
        const linha = document.createElement("tr");

        linha.innerHTML = `
          <td>${p.PROCESSO || ""}</td>
          <td>${p.LIMINAR || ""}</td>
          <td>${p.SEI || ""}</td>
          <td>${p.LOCAL || ""}</td>
          <td>${p.SETOR || ""}</td>
          <td>${p.MES || ""}</td>
        `;

        lista.appendChild(linha);
      });
    }

    // 🔍 FILTRO (busca + mês)
    function filtrar() {
      const termo = document.getElementById("busca").value.toLowerCase();
      const mes = document.getElementById("filtroMes").value;

      const filtrados = dadosGlobais.filter(p => {
        const texto =
          (p.PROCESSO + " " +
          p.LIMINAR + " " +
          p.SEI + " " +
          p.LOCAL + " " +
          p.SETOR + " " +
          p.MES).toLowerCase();

        const matchTexto = texto.includes(termo);
        const matchMes = mes === "" || p.MES === mes;

        return matchTexto && matchMes;
      });

      renderTabela(filtrados);
    }

    verificarUsuario();
  </script>

</body>
</html>
