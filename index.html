<!DOCTYPE html>
<html>
<head>
  <title>Sistema de Processos</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f9;
    }

    /* LOGIN */
    #login {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #2c3e50, #3498db);
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: 10px;
      text-align: center;
      width: 300px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px;
      width: 100%;
      background: #2c3e50;
      color: white;
      border: none;
      cursor: pointer;
    }

    /* SISTEMA */
    #sistema {
      display: none;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 220px;
      background: #2c3e50;
      color: white;
      padding: 20px;
    }

    .sidebar button {
      width: 100%;
      margin-top: 10px;
      background: #34495e;
    }

    .content {
      flex: 1;
      padding: 20px;
    }

    iframe {
      width: 100%;
      height: 90vh;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="fazerLogin()">Entrar</button>
    <p id="erro" style="color:red;"></p>
  </div>
</div>

<!-- SISTEMA -->
<div id="sistema">
  <div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <h2>📊 Sistema</h2>
      <button onclick="mostrarDashboard()">Dashboard</button>
      <button onclick="logout()">Sair</button>
    </div>

    <!-- CONTEÚDO -->
    <div class="content">
      <h1>Dashboard</h1>

      <iframe 
        src="https://datastudio.google.com/embed/reporting/0df2efad-e234-419c-bfbc-cf4a86ca3a53/page/TcRvF"
        allowfullscreen>
      </iframe>

    </div>

  </div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://ewibndqllbxfduyzvkpl.supabase.co",
  "sb_publishable_RlS6dWkf2f8-dFvifnrLxQ_gj-nvmwM"
);

// 🔥 MONITORA SESSÃO (corrige erro de token)
supabaseClient.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_OUT' || !session) {
    location.reload();
  }
});

// LOGIN
async function fazerLogin() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password: senha
  });

  if (error) {
    document.getElementById("erro").innerText = "Login inválido";
    return;
  }

  verificarUsuario();
}

// 🔥 VERIFICAÇÃO SEGURA DE SESSÃO
async function verificarUsuario() {
  const { data, error } = await supabaseClient.auth.getSession();

  if (error) {
    console.log("Erro sessão:", error);
    await supabaseClient.auth.signOut();
    return;
  }

  if (data.session) {
    document.getElementById("login").style.display = "none";
    document.getElementById("sistema").style.display = "block";
  }
}

// LOGOUT
async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

// DASHBOARD (placeholder)
function mostrarDashboard() {
  // já está visível
}

// INICIAR
verificarUsuario();
</script>

</body>
</html>
