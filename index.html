<!DOCTYPE html>
<html>
<head>
  <title>Sistema CAEMA</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      background: #f4f6f9;
    }

    .sidebar {
      width: 220px;
      background: #2c3e50;
      color: white;
      height: 100vh;
      padding: 20px;
      display: none;
    }

    .sidebar button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border: none;
      background: #34495e;
      color: white;
      cursor: pointer;
    }

    .content {
      flex: 1;
      padding: 20px;
    }

    /* LOGIN */
    #login {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #2c3e50, #3498db);
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      background: #3498db;
      border: none;
      color: white;
      cursor: pointer;
    }

    iframe {
      width: 100%;
      height: 600px;
      border: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 20px;
    }

    th {
      background: #2c3e50;
      color: white;
      padding: 10px;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid #ddd;
    }

    .status {
      margin-top: 10px;
      font-weight: bold;
    }

    .loading {
      color: blue;
    }

    .erro {
      color: red;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="fazerLogin()">Entrar</button>
    <p id="erroLogin" style="color:red;"></p>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h2>📊 Sistema</h2>
  <button onclick="mostrarTela('dashboard')">Dashboard</button>
  <button onclick="carregarRelatorio()">Processos</button>
  <button onclick="carregarLiminar()">Liminar</button>
  <button onclick="logout()">Sair</button>
</div>

<!-- CONTEÚDO -->
<div class="content" id="sistema" style="display:none;">

  <!-- DASHBOARD -->
  <div id="dashboard">
    <h1>Dashboard</h1>
    <iframe src="https://datastudio.google.com/embed/reporting/0df2efad-e234-419c-bfbc-cf4a86ca3a53/page/TcRvF"></iframe>
  </div>

  <!-- PROCESSOS -->
  <div id="processos" style="display:none;">
    <h1>Processos</h1>

    <input type="text" id="buscaRelatorio" placeholder="Buscar..." onkeyup="filtrarRelatorio()">

    <p class="status loading" id="statusRelatorio"></p>

    <h3>Total: <span id="totalRelatorio">0</span></h3>

    <table>
      <thead>
        <tr>
          <th>Processo</th>
          <th>Local</th>
          <th>Objeto</th>
          <th>Valor</th>
          <th>Diretoria</th>
          <th>Ano</th>
        </tr>
      </thead>
      <tbody id="listaRelatorio"></tbody>
    </table>
  </div>

  <!-- LIMINAR -->
  <div id="liminar" style="display:none;">
    <h1>Liminar</h1>

    <p class="status loading" id="statusLiminar"></p>

    <h3>Total: <span id="totalLiminar">0</span></h3>

    <table>
      <thead>
        <tr>
          <th>Processo</th>
          <th>Liminar</th>
          <th>Local</th>
          <th>Setor</th>
          <th>Mês</th>
        </tr>
      </thead>
      <tbody id="listaLiminar"></tbody>
    </table>
  </div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://ewibndqllbxfduyzvkpl.supabase.co",
  "SUA_CHAVE_AQUI"
);

let dadosRelatorio = [];

/* LOGIN */
async function fazerLogin() {
  const { error } = await supabaseClient.auth.signInWithPassword({
    email: email.value,
    password: senha.value
  });

  if (error) {
    erroLogin.innerText = "Login inválido";
    return;
  }

  login.style.display = "none";
  sistema.style.display = "block";
  sidebar.style.display = "block";
}

/* LOGOUT */
async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

/* TROCAR TELA */
function mostrarTela(tela) {
  dashboard.style.display = "none";
  processos.style.display = "none";
  liminar.style.display = "none";

  document.getElementById(tela).style.display = "block";
}

/* RELATORIO */
async function carregarRelatorio() {
  mostrarTela("processos");

  statusRelatorio.innerText = "Carregando...";
  statusRelatorio.className = "status loading";

  const { data, error } = await supabaseClient
    .from("relatorio")
    .select("*");

  console.log(data, error);

  if (error) {
    statusRelatorio.innerText = "Erro ao carregar dados!";
    statusRelatorio.className = "status erro";
    return;
  }

  statusRelatorio.innerText = "";
  dadosRelatorio = data;

  atualizarTabelaRelatorio(data);
}

/* FILTRO */
function filtrarRelatorio() {
  const busca = buscaRelatorio.value.toLowerCase();

  const filtrados = dadosRelatorio.filter(p =>
    JSON.stringify(p).toLowerCase().includes(busca)
  );

  atualizarTabelaRelatorio(filtrados);
}

/* ATUALIZA TABELA */
function atualizarTabelaRelatorio(data) {
  totalRelatorio.innerText = data.length;
  listaRelatorio.innerHTML = "";

  data.forEach(p => {
    listaRelatorio.innerHTML += `
      <tr>
        <td>${p.processo || ""}</td>
        <td>${p.local || ""}</td>
        <td>${p.objeto_da_acao || ""}</td>
        <td>${p.valor_da_causa || ""}</td>
        <td>${p.diretoria || ""}</td>
        <td>${p.ano || ""}</td>
      </tr>
    `;
  });
}

/* LIMINAR */
async function carregarLiminar() {
  mostrarTela("liminar");

  statusLiminar.innerText = "Carregando...";
  statusLiminar.className = "status loading";

  const { data, error } = await supabaseClient
    .from("liminar")
    .select("*");

  console.log(data, error);

  if (error) {
    statusLiminar.innerText = "Erro ao carregar dados!";
    statusLiminar.className = "status erro";
    return;
  }

  statusLiminar.innerText = "";

  totalLiminar.innerText = data.length;
  listaLiminar.innerHTML = "";

  data.forEach(p => {
    listaLiminar.innerHTML += `
      <tr>
        <td>${p.processo || ""}</td>
        <td>${p.liminar || ""}</td>
        <td>${p.local || ""}</td>
        <td>${p.setor || ""}</td>
        <td>${p.mes || ""}</td>
      </tr>
    `;
  });
}
</script>

</body>
</html>
