<!DOCTYPE html>
<html>
<head>
  <title>Sistema de Processos</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

  <h1>📊 Sistema de Processos</h1>

  <div id="login">
    <h2>🔐 Login</h2>
    <input type="email" id="email" placeholder="Email"><br><br>
    <input type="password" id="senha" placeholder="Senha"><br><br>
    <button onclick="login()">Entrar</button>
    <p id="erro" style="color:red;"></p>
  </div>

  <div id="sistema" style="display:none;">
    <button onclick="logout()">Sair</button>
    <h2>📋 Processos</h2>
    <ul id="lista"></ul>
  </div>

  <script>
    const supabaseClient = supabase.createClient(
      "https://ewibndqllbxfduyzvkpl.supabase.co",
      "sb_publishable_RlS6dWkf2f8-dFvifnrLxQ_gj-nvmwM"
    );

    async function login() {
      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: senha
      });

      if (error) {
        document.getElementById("erro").innerText = "Login inválido";
        return;
      }

      document.getElementById("login").style.display = "none";
      document.getElementById("sistema").style.display = "block";

      carregarProcessos();
    }

    async function carregarProcessos() {
      const { data } = await supabaseClient
        .from('processos')
        .select('*');

      const lista = document.getElementById("lista");
      lista.innerHTML = "";

      data.forEach(p => {
        const item = document.createElement("li");
        item.innerText = 
          p.numero + " | " + p.liminar + " | " + p.local;
        lista.appendChild(item);
        async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}
      });
    }
  </script>

</body>
</html>
