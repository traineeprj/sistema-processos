<!DOCTYPE html>
<html>
<head>
  <title>Sistema CAEMA</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      background: #f4f6f9;
    }

    .sidebar {
      width: 220px;
      background: #2c3e50;
      color: white;
      height: 100vh;
      padding: 20px;
      display: none;
    }

    .sidebar button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border: none;
      background: #34495e;
      color: white;
      cursor: pointer;
    }

    .content {
      flex: 1;
      padding: 20px;
    }

    /* LOGIN */
    #login {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #2c3e50, #3498db);
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
    }

    .login-box img {
      width: 120px;
      margin-bottom: 20px;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      background: #3498db;
      border: none;
      color: white;
      cursor: pointer;
    }

    iframe {
      width: 100%;
      height: 600px;
      border: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 20px;
    }

    th {
      background: #2c3e50;
      color: white;
      padding: 10px;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Logo_CAEMA.png/320px-Logo_CAEMA.png">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="fazerLogin()">Entrar</button>
    <p id="erro" style="color:red;"></p>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h2>📊 Sistema</h2>
  <button onclick="mostrarTela('dashboard')">Dashboard</button>
  <button onclick="mostrarTela('processos')">Processos</button>
  <button onclick="logout()">Sair</button>
</div>

<!-- CONTEÚDO -->
<div class="content" id="sistema" style="display:none;">

  <!-- DASHBOARD -->
  <div id="dashboard">
    <h1>Dashboard</h1>

    <iframe src="https://datastudio.google.com/embed/reporting/0df2efad-e234-419c-bfbc-cf4a86ca3a53/page/TcRvF"></iframe>
  </div>

  <!-- PROCESSOS -->
  <div id="processos" style="display:none;">
    <h1>Processos</h1>

    <h3>Total: <span id="total">0</span></h3>
    <h3>Valor Total: R$ <span id="valorTotal">0</span></h3>

    <table>
      <thead>
        <tr>
          <th>Processo</th>
          <th>Local</th>
          <th>Objeto</th>
          <th>Valor</th>
          <th>Diretoria</th>
          <th>Ano</th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>
  </div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://ewibndqllbxfduyzvkpl.supabase.co",
  "sb_publishable_RlS6dWkf2f8-dFvifnrLxQ_gj-nvmwM"
);

let dados = [];

/* LOGIN */
async function fazerLogin() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: senha
  });

  if (error) {
    document.getElementById("erro").innerText = "Login inválido";
    return;
  }

  iniciarSistema();
}

/* INICIAR */
function iniciarSistema() {
  document.getElementById("login").style.display = "none";
  document.getElementById("sistema").style.display = "block";
  document.getElementById("sidebar").style.display = "block";

  carregarDados();
}

/* LOGOUT */
async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

/* TROCAR TELA */
function mostrarTela(tela) {
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("processos").style.display = "none";

  document.getElementById(tela).style.display = "block";
}

/* CARREGAR DADOS */
async function carregarDados() {
  const { data, error } = await supabaseClient
    .from("processos")
    .select("*");

  console.log(data);

  if (error) {
    alert("Erro ao carregar dados");
    return;
  }

  dados = data;
  renderTabela();
}

/* FORMATAR VALOR */
function parseValor(valor) {
  if (!valor) return 0;

  return parseFloat(
    valor
      .replace("R$", "")
      .replace(/\./g, "")
      .replace(",", ".")
  ) || 0;
}

/* RENDER */
function renderTabela() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  document.getElementById("total").innerText = dados.length;

  let soma = 0;

  dados.forEach(p => {
    soma += parseValor(p.VALOR_DA_CAUSA);

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${p.PROCESSO || ""}</td>
      <td>${p.LOCAL || ""}</td>
      <td>${p.OBJETO_DA_ACAO || ""}</td>
      <td>${p.VALOR_DA_CAUSA || ""}</td>
      <td>${p.DIRETORIA || ""}</td>
      <td>${p.ANO || ""}</td>
    `;

    lista.appendChild(tr);
  });

  document.getElementById("valorTotal").innerText =
    soma.toLocaleString("pt-BR", { minimumFractionDigits: 2 });
}
</script>

</body>
</html>
