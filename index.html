<!DOCTYPE html>
<html>
<head>
  <title>Sistema</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      background: #f4f6f9;
    }

    .sidebar {
      width: 220px;
      background: #2c3e50;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      background: #34495e;
      color: white;
      cursor: pointer;
    }

    .content {
      flex: 1;
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 20px;
    }

    th {
      background: #2c3e50;
      color: white;
      padding: 10px;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid #ddd;
    }

    #login {
      margin: auto;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>📊 Sistema</h2>

  <button onclick="carregarRelatorio()">Processos</button>
  <button onclick="carregarLiminar()">Liminar</button>
  <button onclick="logout()">Sair</button>
</div>

<div class="content">

  <!-- LOGIN -->
  <div id="login">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email"><br><br>
    <input type="password" id="senha" placeholder="Senha"><br><br>
    <button onclick="fazerLogin()">Entrar</button>
    <p id="erro" style="color:red;"></p>
  </div>

  <!-- SISTEMA -->
  <div id="sistema" style="display:none;">
    <h1 id="titulo">Tabela</h1>
    <h3>Total: <span id="total">0</span></h3>

    <table>
      <thead id="thead"></thead>
      <tbody id="lista"></tbody>
    </table>
  </div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://ewibndqllbxfduyzvkpl.supabase.co",
  "sb_publishable_RlS6dWkf2f8-dFvifnrLxQ_gj-nvmwM"
);

// LOGIN
async function fazerLogin() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password: senha
  });

  if (error) {
    document.getElementById("erro").innerText = "Login inválido";
    return;
  }

  verificarUsuario();
}

// VERIFICAR LOGIN
async function verificarUsuario() {
  const { data } = await supabaseClient.auth.getSession();

  if (data.session) {
    document.getElementById("login").style.display = "none";
    document.getElementById("sistema").style.display = "block";
  }
}

// LOGOUT
async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

verificarUsuario();


// ==========================
// RELATÓRIO
// ==========================
async function carregarRelatorio() {
  document.getElementById("titulo").innerText = "Processos";

  const { data } = await supabaseClient
    .from('Relatorio')
    .select('*');

  document.getElementById("total").innerText = data.length;

  document.getElementById("thead").innerHTML = `
    <tr>
      <th>Data</th>
      <th>Ano</th>
      <th>Processo</th>
      <th>Local</th>
      <th>Objeto</th>
      <th>Valor</th>
      <th>Diretoria</th>
    </tr>
  `;

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.forEach(p => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${p.DATA || ""}</td>
      <td>${p.ANO || ""}</td>
      <td>${p.PROCESSO || ""}</td>
      <td>${p.LOCAL || ""}</td>
      <td>${p["OBJETO DA ACAO"] || ""}</td>
      <td>${p["VALOR DA CAUSA"] || ""}</td>
      <td>${p.DIRETORIA || ""}</td>
    `;

    lista.appendChild(tr);
  });
}


// ==========================
// LIMINAR
// ==========================
async function carregarLiminar() {
  document.getElementById("titulo").innerText = "Liminar";

  const { data } = await supabaseClient
    .from('Liminar')
    .select('*');

  document.getElementById("total").innerText = data.length;

  document.getElementById("thead").innerHTML = `
    <tr>
      <th>Processo</th>
      <th>Liminar</th>
      <th>SEI</th>
      <th>Setor</th>
      <th>Mês</th>
    </tr>
  `;

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.forEach(p => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${p.PROCESSO || ""}</td>
      <td>${p.LIMINAR || ""}</td>
      <td>${p.SEI || ""}</td>
      <td>${p.SETOR || ""}</td>
      <td>${p.MES || ""}</td>
    `;

    lista.appendChild(tr);
  });
}
</script>

</body>
</html>
