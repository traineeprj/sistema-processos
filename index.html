<!DOCTYPE html>
<html>
<head>
  <title>Sistema de Processos</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      background: #f4f6f9;
    }

    .sidebar {
      width: 220px;
      background: #2c3e50;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
    }

    .sidebar button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border: none;
      background: #34495e;
      color: white;
      cursor: pointer;
    }

    .content {
      flex: 1;
      padding: 20px;
    }

    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      flex: 1;
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input, select {
      padding: 8px;
      margin: 5px;
      width: 200px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 20px;
    }

    th {
      background: #2c3e50;
      color: white;
      padding: 10px;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid #ddd;
    }

    iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>📊 Sistema</h2>
  <button onclick="mostrarTela('dashboard')">Dashboard</button>
  <button onclick="mostrarTela('tabela')">Processos</button>
</div>

<div class="content">

  <!-- DASHBOARD (LOOKER) -->
  <div id="dashboard">
    <h1>Dashboard</h1>

    <iframe src="https://datastudio.google.com/embed/reporting/0df2efad-e234-419c-bfbc-cf4a86ca3a53/page/TcRvF"></iframe>
  </div>

  <!-- PROCESSOS -->
  <div id="tabela" style="display:none;">
    <h1>Processos</h1>

    <div class="cards">
      <div class="card">
        <h3>Total</h3>
        <h2 id="total">0</h2>
      </div>

      <div class="card">
        <h3>Valor Total</h3>
        <h2 id="valorTotal">R$ 0</h2>
      </div>
    </div>

    <!-- FILTROS -->
    <input type="text" id="busca" placeholder="Buscar..." onkeyup="filtrar()">

    <select id="filtroAno" onchange="filtrar()">
      <option value="">Ano</option>
    </select>

    <select id="filtroDiretoria" onchange="filtrar()">
      <option value="">Diretoria</option>
    </select>

    <select id="filtroLocal" onchange="filtrar()">
      <option value="">Local</option>
    </select>

    <!-- TABELA -->
    <table>
      <thead>
        <tr>
          <th>Processo</th>
          <th>Local</th>
          <th>Objeto</th>
          <th>Valor</th>
          <th>Diretoria</th>
          <th>Ano</th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>

  </div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://ewibndqllbxfduyzvkpl.supabase.co",
  "SUA_PUBLIC_KEY_AQUI"
);

let dados = [];

// TROCA DE TELA
function mostrarTela(tela) {
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("tabela").style.display = "none";

  document.getElementById(tela).style.display = "block";
}

// CARREGAR DADOS
async function carregarDados() {
  const { data, error } = await supabaseClient
    .from('processos')
    .select('*');

  if (error) {
    console.log("Erro:", error);
    return;
  }

  console.log(data);

  dados = data;
  preencherFiltros();
  atualizarTela(dados);
}

// PREENCHER FILTROS
function preencherFiltros() {
  const anos = [...new Set(dados.map(d => d.ANO))];
  const diretorias = [...new Set(dados.map(d => d.DIRETORIA))];
  const locais = [...new Set(dados.map(d => d.LOCAL))];

  anos.forEach(a => {
    filtroAno.innerHTML += `<option>${a}</option>`;
  });

  diretorias.forEach(d => {
    filtroDiretoria.innerHTML += `<option>${d}</option>`;
  });

  locais.forEach(l => {
    filtroLocal.innerHTML += `<option>${l}</option>`;
  });
}

// ATUALIZAR TELA
function atualizarTela(lista) {
  document.getElementById("total").innerText = lista.length;

  let totalValor = 0;

  lista.forEach(d => {
    let valor = d.VALOR_DA_CAUSA || 0;

    valor = valor.toString()
      .replace("R$", "")
      .replace(/\./g, "")
      .replace(",", ".");

    totalValor += parseFloat(valor) || 0;
  });

  document.getElementById("valorTotal").innerText =
    totalValor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

  const tabela = document.getElementById("lista");
  tabela.innerHTML = "";

  lista.forEach(d => {
    tabela.innerHTML += `
      <tr>
        <td>${d.PROCESSO || ""}</td>
        <td>${d.LOCAL || ""}</td>
        <td>${d.OBJETO_DA_ACAO || ""}</td>
        <td>${d.VALOR_DA_CAUSA || ""}</td>
        <td>${d.DIRETORIA || ""}</td>
        <td>${d.ANO || ""}</td>
      </tr>
    `;
  });
}

// FILTROS
function filtrar() {
  const busca = document.getElementById("busca").value.toLowerCase();
  const ano = filtroAno.value;
  const diretoria = filtroDiretoria.value;
  const local = filtroLocal.value;

  const filtrado = dados.filter(d => {
    return (
      JSON.stringify(d).toLowerCase().includes(busca) &&
      (ano === "" || d.ANO == ano) &&
      (diretoria === "" || d.DIRETORIA == diretoria) &&
      (local === "" || d.LOCAL == local)
    );
  });

  atualizarTela(filtrado);
}

// INICIAR
carregarDados();
</script>

</body>
</html>
